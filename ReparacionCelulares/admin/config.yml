backend:
  name: git-gateway
  branch: main

media_folder: "img/cms"
public_folder: "img/cms"

locale: 'es'

collections:
  - name: "contenido"
    label: "Panel de Control"
    editor:
      preview: false
    files:
      - label: "Personalización de Plantilla"
        name: "inicio"
        file: "data/content.json"
        fields:
          # --- COLORES ---
          - label: "Color Principal de la Marca"
            name: "tema"
            widget: "object"
            fields:
              - { label: "Color Hexadecimal", name: "color_primario", widget: "color", default: "#E2C775", hint: "El color principal para botones y resaltados." }

          # --- TEXTOS E IMÁGENES ---
          - label: "Imágenes y Logo"
            name: "imagenes"
            widget: "object"
            fields:
              - { label: "Logo Principal", name: "logo", widget: "image", required: false }
              - { label: "Imagen de Perfil/Fondo", name: "hero_image", widget: "image", required: false }

          - label: "Textos Principales"
            name: "textos"
            widget: "object"
            fields:
              - { label: "Nombre en Tarjeta Digital", name: "card_name", widget: "string", default: "Tu Nombre" }
              - { label: "Slogan en Tarjeta Digital", name: "card_slogan", widget: "string", default: "Tu Profesión" }
              - { label: "Título Principal (Hero)", name: "hero_title", widget: "string", default: "Escribe tu título aquí" }
              - { label: "Descripción (Hero)", name: "hero_desc", widget: "text", default: "Escribe una descripción corta aquí." }

          # --- REDES SOCIALES ---
          - label: "Redes Sociales"
            name: "redes"
            widget: "object"
            hint: "Deja en blanco la red social que NO uses para que su botón desaparezca."
            fields:
              - { label: "WhatsApp (Solo números con código de país)", name: "whatsapp", widget: "string", required: false, default: "593999999999" }
              - { label: "Enlace de Facebook", name: "facebook", widget: "string", required: false }
              - { label: "Enlace de Instagram", name: "instagram", widget: "string", required: false }
              - { label: "Enlace de TikTok", name: "tiktok", widget: "string", required: false }
              - { label: "Enlace de LinkedIn", name: "linkedin", widget: "string", required: false }

          # --- CONSTRUCTOR DE PÁGINA ---
          - label: "Secciones Visibles y Orden"
            name: "secciones"
            widget: "select"
            multiple: true
            hint: "Selecciona y arrastra para reordenar las secciones que quieres mostrar en tu web."
            options:
              - { label: "Servicios / Especialidades", value: "sec-servicios" }
              - { label: "Perfil / Quienes Somos", value: "sec-perfil" }
              - { label: "Precios y Paquetes", value: "sec-precios" }
              - { label: "Ubicación", value: "sec-ubicacion" }
              - { label: "Preguntas Frecuentes", value: "sec-faq" }
              - { label: "Llamada a la Acción (CTA final)", value: "sec-cta" }
            default: ["sec-servicios", "sec-perfil", "sec-ubicacion", "sec-faq", "sec-cta"]
