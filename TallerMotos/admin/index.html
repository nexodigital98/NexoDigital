<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Panel de Administración | NexusDigital</title>
    <!-- Incluye el widget de identidad de Netlify para el inicio de sesión -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preload" as="image" href="img/bg/fondo_tarjeta_digital_web.png" fetchpriority="high">
</head>
  <body>
    <!-- Script principal de Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // Redirige al usuario al panel después de hacer login exitosamente
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
