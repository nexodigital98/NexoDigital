backend:
  name: git-gateway
  branch: main # Branch to update (main)

media_folder: "img/cms" # Folder where uploaded files will be saved
public_folder: "img/cms" # Public path to media files

# Locale settings
locale: 'es'

collections:
  - name: "contenido"
    label: "Contenido de la Web"
    editor:
      preview: false
    files:
      - label: "Página Principal (Inicio)"
        name: "inicio"
        file: "data/content.json"
        fields:
          - { label: "Hero - Título Principal", name: "hero_title", widget: "string", default: "Expertos en Clínica Dental" }
          - { label: "Hero - Descripción", name: "hero_desc", widget: "text", default: "Confía en nosotros, cuidamos tu sonrisa brindándote salud bucal integral. Nos enfocamos en ofrecer el mejor servicio para tu satisfacción." }
          - { label: "Hero - Años de Experiencia", name: "stat1_num", widget: "string", default: "10+" }
          - { label: "Hero - Cantidad de Declaraciones", name: "stat2_num", widget: "string", default: "500+" }
          - { label: "Hero - Imagen de Fondo/Equipo", name: "hero_image", widget: "image", required: false }
          
          - { label: "Nosotros - Título", name: "about_title", widget: "string", default: "Tu Mejor Opción en Clínica Dental" }
          - { label: "Nosotros - Párrafo", name: "about_text", widget: "text", default: "No somos solo un servicio más. Somos profesionales dedicados a brindarte la mejor experiencia en clínica dental, asegurando calidad y compromiso." }
          
          - { label: "Servicio 1 - Nombre", name: "serv1_name", widget: "string", default: "Ortodoncia" }
          - { label: "Servicio 1 - Descripción", name: "serv1_desc", widget: "text", default: "Servicio especializado de ortodoncia diseñado para cubrir tus necesidades con total profesionalismo." }
          
          - { label: "Servicio 2 - Nombre", name: "serv2_name", widget: "string", default: "Implantes Dentales" }
          - { label: "Servicio 2 - Descripción", name: "serv2_desc", widget: "text", default: "Brindamos implantes dentales con los más altos estándares de calidad y atención al detalle." }
          
          - { label: "Servicio 3 - Nombre", name: "serv3_name", widget: "string", default: "Blanqueamiento" }
          - { label: "Servicio 3 - Descripción", name: "serv3_desc", widget: "text", default: "Expertos en blanqueamiento, garantizando resultados eficientes y confiables." }
          
          - { label: "Servicio 4 - Nombre", name: "serv4_name", widget: "string", default: "Odontopediatría" }
          - { label: "Servicio 4 - Descripción", name: "serv4_desc", widget: "text", default: "Nuestro servicio de odontopediatría te ofrece seguridad y respaldo en cada etapa." }
